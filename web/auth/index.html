<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Style Auth</title>
    <link rel="stylesheet" href="/auth/style.css">
    
</head>
<body>
    
    <div class="lang-switcher" id="langSwitcher">RU</div>

    <div class="auth-container">
        <div class="auth-tabs">
            <button class="tab-btn active" id="tabLogin" data-text="loginTab">Вход</button>
            <button class="tab-btn" id="tabSignup" data-text="signupTab">Регистрация</button>
        </div>

        <div class="msg-box" id="msgBox"></div>

        <form id="loginForm" class="auth-form active" novalidate>
            <div class="input-group">
                <input type="text" id="loginUser" required placeholder=" ">
                <label for="loginUser" data-text="loginPlaceholder">Email или логин</label>
            </div>
            <div class="input-group">
                <input type="password" id="loginPassword" required placeholder=" ">
                <label for="loginPassword" data-text="passwordPlaceholder">Пароль</label>
            </div>
            
            <div class="form-options">
                <label class="checkbox-container">
                    <input type="checkbox" id="rememberMe">
                    <span class="checkmark"></span>
                    <span data-text="rememberMe">Не выходить из аккаунта</span>
                </label>
            </div>

            <button type="submit" class="submit-btn" data-text="loginBtn">Войти</button>
        </form>

        <form id="signupForm" class="auth-form" novalidate>
            <div class="input-group">
                <input type="email" id="signupEmail" required placeholder=" ">
                <label for="signupEmail">Email</label>
            </div>
            <div class="input-group">
                <input type="text" id="signupLogin" required placeholder=" ">
                <label for="signupLogin" data-text="usernamePlaceholder">Логин</label>
            </div>
            <div class="input-group">
                <input type="text" id="signupEmoji" maxlength="2" placeholder=" ">
                <label for="signupEmoji" data-text="emojiPlaceholder">Выбери статус-эмодзи (😎, 🚀)</label>
            </div>
            <div class="input-group">
                <input type="password" id="signupPassword" required placeholder=" ">
                <label for="signupPassword" data-text="passwordPlaceholder">Пароль</label>
            </div>

            <button type="submit" class="submit-btn" data-text="signupBtn">Создать аккаунт</button>
        </form>
    </div>

    <script src="/auth/script.js"></script>
</body>
</html>
