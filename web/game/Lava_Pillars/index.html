<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lava Pillars — MathBattle</title>
    <link rel="stylesheet" href="/Lava_Pillars-assets/style.css">
</head>
<body>

    <div class="game-arena" id="gameArena">
        <div class="lava-ocean" id="lavaOcean"></div>

        <div class="pillars-container" id="pillarsContainer"></div>

        <div class="quiz-container" id="quizContainer">
            <div class="quiz-bubble" id="quizQuestion">Ожидание вопроса от сервера...</div>
            <div class="quiz-timer" id="quizTimer">15:00</div>
            <div class="answers-grid" id="answersGrid">
                <button class="answer-btn">Вариант 1</button>
                <button class="answer-btn">Вариант 2</button>
                <button class="answer-btn">Вариант 3</button>
                <button class="answer-btn">Вариант 4</button>
            </div>
        </div>

        <div class="round-counter" id="roundCounter">Раунд: 1</div>

        <div class="countdown-overlay" id="countdownOverlay" style="display: none;">
            <div class="countdown-number" id="countdownNumber">3</div>
        </div>
    </div>

    <div class="room-overlay" id="roomOverlay">
       <div class="room-window">
    <div class="room-header">
        <h2>Комната: <span id="lobbyCode">---</span></h2>
        <div class="player-count" id="playerCount">0/4</div>
    </div>
    
    <div class="game-mode-selector" id="gameModeSelector">
        <label class="mode-option">
            <input type="radio" name="gamePack" value="1" checked>
            <span class="mode-card">
                <span class="mode-icon">🧮</span>
                <span class="mode-title">Math</span>
            </span>
        </label>
        <label class="mode-option">
            <input type="radio" name="gamePack" value="2">
            <span class="mode-card">
                <span class="mode-icon">🌍</span>
                <span class="mode-title">Everything</span>
            </span>
        </label>
    </div>

    <div class="players-list" id="playersList"></div>
    <div class="room-footer">
        <button class="action-btn ready-toggle-btn" id="readyBtn">Статус: Не готов</button>
        <button class="action-btn start-game-btn disabled" id="startBtn" disabled>Запустить игру</button>
    </div>
</div>
    </div>

    <div class="room-overlay" id="gameOverOverlay" style="display: none;">
        <div class="room-window text-center">
            <h1 id="gameOverTitle" style="font-size: 32px; margin-bottom: 10px;">🏆 Ты выиграл!</h1>
            <p id="gameOverSub" style="color: rgba(255,255,255,0.6); margin-bottom: 20px;">Отличный результат, лава тебя не достала!</p>
            <button class="action-btn ready-toggle-btn" onclick="window.location.reload()">В главное меню</button>
        </div>
    </div>

    <div class="chat-widget">
        <div class="chat-header">
            <h3>Общий чат</h3>
            <span class="online-badge">● Online</span>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <form class="chat-input-area" id="chatForm">
            <input type="text" id="chatInput" placeholder="Ваше сообщение..." autocomplete="off">
            <button type="submit">➔</button>
        </form>
    </div>

    <script src="/Lava_Pillars-assets/script.js"></script>
</body>
</html>
